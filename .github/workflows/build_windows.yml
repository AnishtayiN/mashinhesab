name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows Executable
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: requirements.txt
        
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
        
      - name: Create simple icon file
        run: |
          python -c "
import base64
import os

png_data = base64.b64decode('iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNkYPhfDwAChwGA60e6kgAAAABJRU5ErkJggg==')

with open('calculator.png', 'wb') as f:
    f.write(png_data)

with open('calculator.ico', 'wb') as f:
    f.write(b'\x00\x00\x01\x00\x40\x40\x00\x00\x00\x00\x01\x00\x20\x00')
    f.write(png_data)

print('Created placeholder icon files')
"
        
      - name: Build with PyInstaller
        run: |
          pyinstaller calculator.spec --clean --noconfirm
        
      - name: Rename executable
        shell: bash
        run: |
          if [ -f "dist/calculator-win.exe" ]; then
            mv "dist/calculator-win.exe" "calculator-win.exe"
          elif [ -f "dist/calculator-win" ]; then
            mv "dist/calculator-win" "calculator-win.exe"
          else
            for file in dist/*.exe; do
              if [ -f "$file" ]; then
                mv "$file" "calculator-win.exe"
                break
              fi
            done
          fi
      
      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: calculator-win-exe
          path: calculator-win.exe
          compression-level: 9
      
      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: calculator-win.exe
          name: Release ${{\ github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{\ secrets.GITHUB_TOKEN }}
