name: Build Android APKs

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APKs
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: requirements.txt
      
      - name: Install Buildozer and dependencies
        run: |
          python -m pip install --upgrade pip
          pip install buildozer
          pip install -r requirements.txt
      
      - name: Install Android SDK and NDK
        uses: android-actions/setup-android@v3
        with:
          sdk-version: '33'
          ndk-version: '23b'
          cmake-version: '3.10.2'
          accept-licenses: true
      
      - name: Create simple icon file
        run: |
          python3 -c "
import base64
import os

os.makedirs('resources', exist_ok=True)

png_data = base64.b64decode('iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNkYPhfDwAChwGA60e6kgAAAABJRU5ErkJggg==')

with open('calculator.png', 'wb') as f:
    f.write(png_data)

with open('resources/calculator.png', 'wb') as f:
    f.write(png_data)

print('Created placeholder icon files')
"
      
      - name: Build APK with Buildozer
        run: |
          buildozer -v android debug
      
      - name: Rename APK files
        run: |
          if [ -f "bin/mashinhesab-*-debug.apk" ]; then
            mv bin/mashinhesab-*-debug.apk calculator-android-legacy.apk
          elif [ -f "bin/*.apk" ]; then
            mv bin/*.apk calculator-android-legacy.apk
          fi
      
      - name: Upload Android APK (Legacy)
        uses: actions/upload-artifact@v4
        with:
          name: calculator-android-legacy
          path: calculator-android-legacy.apk
          compression-level: 9
      
      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: calculator-android-legacy.apk
          name: Release ${{\ github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{\ secrets.GITHUB_TOKEN }}
