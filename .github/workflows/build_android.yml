name: Build Android APKs

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Create simple icon file
        run: |
          python3 -c "import base64,os; os.makedirs('resources', exist_ok=True); png=base64.b64decode('iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNkYPhfDwAChwGA60e6kgAAAABJRU5ErkJggg=='); open('calculator.png','wb').write(png); open('resources/calculator.png','wb').write(png); print('Icons created')"
      
      - name: Cache Buildozer global directory
        uses: actions/cache@v3
        with:
          path: .buildozer_global
          key: buildozer-global-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-global-
      
      - name: Build APK with Buildozer
        uses: ArtemSBulgakov/buildozer-action@v1
        id: buildozer
        with:
          workdir: .
          buildozer_version: stable
          command: android debug
      
      - name: Get APK filename
        id: apk_filename
        run: |
          if [ -f "${{ steps.buildozer.outputs.filename }}" ]; then
            echo "filename=${{ steps.buildozer.outputs.filename }}" >> $GITHUB_OUTPUT
          elif ls bin/*.apk 1> /dev/null 2>&1; then
            echo "filename=bin/$(ls bin/*.apk | head -1)" >> $GITHUB_OUTPUT
          else
            echo "filename=" >> $GITHUB_OUTPUT
          fi
      
      - name: Rename APK
        run: |
          if [ -n "${{ steps.apk_filename.outputs.filename }}" ]; then
            cp "${{ steps.apk_filename.outputs.filename }}" calculator-android.apk
          fi
      
      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: calculator-android-apk
          path: calculator-android.apk
          compression-level: 9
      
      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: calculator-android.apk
          name: Release ${{\ github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{\ secrets.GITHUB_TOKEN }}
