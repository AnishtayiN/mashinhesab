name: graphic_calculator
description: A beautiful and powerful scientific graphical calculator app for Android with themes, history, and advanced features
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0
  animated_text_kit: ^4.2.2
  flutter_animate: ^4.1.1
  shared_preferences: ^2.2.2
  intl: ^0.18.1
  audioplayers: ^5.0.1
  vibration: ^2.0.0
  share_plus: ^7.2.1
  url_launcher: ^6.2.2
  badge: ^3.0.0
  clipboard: ^0.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  mockito: ^5.4.2
  build_runner: ^2.4.6

flutter:
  uses-material-design: true
